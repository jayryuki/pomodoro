<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pomodoro Rotate</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="debug-overlay" class="hidden">
            <div>Gamma: <span id="debug-gamma">0</span>°</div>
            <div>Rotation: <span id="debug-rotation">0</span>°</div>
            <div>Zone: <span id="debug-zone">0</span></div>
            <div>Locked: <span id="debug-locked">true</span></div>
        </div>
        
        <div id="preset-indicator">Preset: <span id="current-preset">5</span> min</div>
        
        <div id="timer-wrapper">
            <div id="orientation-ring">
                <div class="zone-marker" data-zone="0" data-position="left" data-tick="315" style="--tick-angle: 315deg;"></div>
                <div class="zone-marker" data-zone="0" data-position="right" data-tick="45" style="--tick-angle: 45deg;"></div>
                <div class="zone-marker" data-zone="1" data-position="left" data-tick="45" style="--tick-angle: 45deg;"></div>
                <div class="zone-marker" data-zone="1" data-position="right" data-tick="135" style="--tick-angle: 135deg;"></div>
                <div class="zone-marker" data-zone="2" data-position="left" data-tick="135" style="--tick-angle: 135deg;"></div>
                <div class="zone-marker" data-zone="2" data-position="right" data-tick="225" style="--tick-angle: 225deg;"></div>
                <div class="zone-marker" data-zone="3" data-position="left" data-tick="225" style="--tick-angle: 225deg;"></div>
                <div class="zone-marker" data-zone="3" data-position="right" data-tick="315" style="--tick-angle: 315deg;"></div>
                <div id="orientation-ball"></div>
            </div>
            <div id="timer-display">05:00</div>
        </div>
        
        <button id="start-btn">Start</button>
        
        <button id="settings-btn" aria-label="Settings">⚙</button>
    </div>
    
    <div id="settings-modal" class="hidden">
        <h2>Settings</h2>
        <label>
            <input type="checkbox" id="debug-toggle">
            Show Debug Info
        </label>
        <label>
            <input type="checkbox" id="unlock-rotation-toggle">
            Unlock Rotation (allow changes while running)
        </label>
        <div id="presets-editor">
            <h3>Presets (minutes)</h3>
            <input type="number" id="preset-1" value="5" min="1">
            <input type="number" id="preset-2" value="10" min="1">
            <input type="number" id="preset-3" value="30" min="1">
            <input type="number" id="preset-4" value="60" min="1">
        </div>
        <div id="sprites-editor">
            <h3>Custom Sprites</h3>
            <label>
                Companion Image:
                <input type="file" id="sprite-companion" accept="image/*">
            </label>
            <label>
                Timer Background:
                <input type="file" id="sprite-timer-bg" accept="image/*">
            </label>
            <div id="current-sprites"></div>
        </div>
        <button id="save-settings">Save</button>
        <button id="close-settings">Close</button>
    </div>
    
    <audio id="alarm-sound" src="sounds/alarm.mp3" loop></audio>
    
    <script src="js/storage.js"></script>
    <script src="js/rotation.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
